apiVersion: apps/v1
kind: Deployment
metadata:
  name: vayulens-web
  namespace: vayulens
  labels:
    app.kubernetes.io/name: vayulens
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vayulens
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vayulens
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: us-east4-docker.pkg.dev/project-72558650-faf6-4529-a05/people-priority/vayulens:gcp-20260708134756-b54f417-amd64
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
