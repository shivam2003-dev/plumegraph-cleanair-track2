apiVersion: v1
kind: Service
metadata:
  name: vayulens-web
  namespace: vayulens
  annotations:
    cloud.google.com/neg: '{"exposed_ports":{"80":{"name":"vayulens-web-80"}}}'
  labels:
    app.kubernetes.io/name: vayulens
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vayulens
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
